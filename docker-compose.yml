version: '3.8'
services:
  backend:
    build: ./backend
    container_name: 7l-backend
    network_mode: host
    env_file: ./backend/.env
    restart: always

  frontend:
    image: nginx:alpine
    container_name: 7l-frontend
    network_mode: host
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: always
