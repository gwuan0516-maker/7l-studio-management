<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>7L街舞工作室</title>
    <link rel="stylesheet" href="style.css?v=11">
</head>
<body>
    <!-- 顶部导航 -->
    <header class="header">
        <div class="header-left">
            <span class="logo">7L</span>
            <span class="brand">街舞工作室</span>
        </div>
        <div class="header-right">
            <span class="header-time" id="headerTime"></span>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="main" id="mainContent">
        <!-- 由JS动态渲染 -->
    </main>

    <!-- 底部导航 -->
    <nav class="bottom-nav">
        <button class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span>首页</span>
        </button>
        <button class="nav-item" data-page="students" onclick="navigate('students')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            <span>学员</span>
        </button>
        <button class="nav-item" data-page="analytics" onclick="navigate('analytics')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
            <span>数据</span>
        </button>
        <button class="nav-item" data-page="settings" onclick="navigate('settings')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            <span>设置</span>
        </button>
        <button class="nav-item" data-page="ai" onclick="navigate('ai')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <span>AI</span>
        </button>
    </nav>

    <!-- Toast 通知 -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- 模态框 -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
        <div class="modal" id="modalContent" onclick="event.stopPropagation()">
            <!-- 动态内容 -->
        </div>
    </div>

    <!-- AI Floating Bubble (PC) -->
    <div class="ai-float-bubble" id="aiFloatBubble" onclick="toggleAIPanel()">
        💬
    </div>

    <!-- AI Floating Panel (PC) -->
    <div class="ai-float-panel" id="aiFloatPanel">
        <div class="ai-panel-header">
            <span>🤖 AI助手</span>
            <button class="ai-panel-close" onclick="toggleAIPanel()">✕</button>
        </div>
        <div class="ai-messages" id="aiFloatMessages"></div>
        <div class="ai-input-area">
            <textarea class="ai-input" id="aiFloatInput" placeholder="说点什么..." rows="1" onkeydown="handleAIInputKey(event, 'float')"></textarea>
            <button class="ai-send-btn" onclick="sendAIMessage('float')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 21 11 13 2 9 22 2"/></svg>
            </button>
        </div>
    </div>

    <script src="app.js?v=11"></script>
</body>
</html>
